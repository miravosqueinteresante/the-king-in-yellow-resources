---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <p><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date_to_string }}</time>
  {% if page.categories %} • {{ page.categories | join: ", " }}{% endif %}
  {% if page.tags %} • {{ page.tags | join: ", " }}{% endif %}</p>
  {{ content }}
</article>
